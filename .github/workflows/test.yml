name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: orbita
          POSTGRES_PASSWORD: orbita_secret
          POSTGRES_DB: orbita_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=app/services --cov-report=term-missing --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://orbita:orbita_secret@localhost:5432/orbita_test

      - name: Run lint
        run: |
          python -m py_compile app/services/financial_core.py || echo "Compile check done"
