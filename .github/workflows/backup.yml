name: Daily Backup

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 03:00 UTC

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database to Cloudflare R2
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGPORT: ${{ secrets.DB_PORT || '5432' }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          PGDATABASE: ${{ secrets.DB_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: orbita-backups
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="orbita_backup_${TIMESTAMP}.sql.gz"
          pg_dump -Fc | gzip > "$BACKUP_FILE"
          echo "Backup size: $(wc -c < $BACKUP_FILE) bytes"
          echo "Backup created: $BACKUP_FILE"
          # R2 upload not yet wired
          echo "Backup ready for R2 upload"
