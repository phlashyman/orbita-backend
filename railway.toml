# Orbita — Railway deployment configuration
# https://docs.railway.com/

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
numReplicas = 1

[service]
name = "orbita-backend"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"

# Health check — /health returns 200 instantly (no DB check)
[service.healthcheck]
path = "/health"
timeout = 30
interval = 15
startPeriod = 120
